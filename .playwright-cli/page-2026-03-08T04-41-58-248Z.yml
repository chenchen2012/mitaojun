          - heading "关于作者 | 陈琛：蜜桃君 / 天涯大盗" [level=1] [ref=e16]
          - paragraph [ref=e17]:
            - text: 我是陈琛，2005 年 11 月 24 日实名注册天涯，开设博客“天涯大盗”。这里是“陈琛 / 蜜桃君 / 天涯大盗”的作者介绍页，也是
            - link "《蜜桃君成长记》" [ref=e18] [cursor=pointer]:
              - /url: /index.html
            - text: 的身份说明页。
          - paragraph [ref=e19]: 如果你是通过 “蜜桃君”“天涯大盗”“陈琛” 或 “陈琛博客” 这些关键词找到这里，那么你来对地方了。
          - paragraph [ref=e20]: 在科学技术是第一生产力的时代，文科生的价值是什么？这是我在大学毕业那会儿思考的问题。
          - paragraph [ref=e21]: 2005 年，我在一所研发设计制造芯片的部属研究所工作。身边一众科研大牛，包括研发了中国第一块芯片的中国工程院院士。和他们共事的经历，让我不免思考一个问题：在芯片时代，我作为一个文科生，能有何价值？
          - paragraph [ref=e22]: 那时候的我，第一次了解到集成电路领域最有名的摩尔定律。我不仅感受到了技术的碾压，更痛感文科的无力。因为工程师大牛们搞的，是极其重要的“核高基”（核心电子器件、高端通用芯片、基础软件产品），而我一个文科生所能做的，只是把大牛们的科研成果记录下来、报道出来。
          - paragraph [ref=e23]: 当时我想，如果理科生的价值是把学到的科技转化成生产力，那么文科生的价值，就是把积累的学识和思想传播出去，转化成影响力。也就是说，理科是生产力，文科是影响力。
          - paragraph [ref=e24]: 有了这样的想法，我开始思考自己如何才能制造影响力。在大学里，我沉迷哲学，饱读文史，不敢说学富五车，也算有真才实学。但如果没有产出，那我终究不过是两脚书橱。正所谓“书生报国一支笔”，我有两种选择：一是向报刊投稿，顺便赚取稿费，但是发表周期太长；二是直接在网上发表，虽然免费，但是可以恣意妄写，随时发表，还能与读者互动。
          - paragraph [ref=e25]: 天下风云出我辈，一入江湖岁月催。血气方刚，时不我待，当时博客如日中天，我选择网上开博，取名“天涯大盗”。从 2005 年 11 月 24 日到 2007 年 4 月，我连续写下 200 篇文章。
          - paragraph [ref=e26]: 文章很快引起了反响。新京报、大公报、新民晚报 / 新民网、天津日报、人民网、央视国际、东方早报，以及门户网站新浪、网易、搜狐等，都对我及我的博客“天涯大盗”有过报道。我的博客“天涯大盗”还获得汽车企业广告赞助，并因此成为当时博客商业化讨论中的一个案例。
