          - paragraph [ref=e53]: 除了《天津日报》《新民晚报》及新民网等相关报道与截图，全球最大的存档网站 Archive.org 保存下来的历史页面，也留住了陈琛及其“天涯大盗”进入更大公共视野时的传播痕迹。它们未必能够单独还原全部来龙去脉，但当这些零散的页面重新拼合在一起时，那个时代博客如何被阅读、讨论与传播，大致的轮廓依然能够浮现出来。
          - paragraph [ref=e54]: 另外，你也可以通过 Archive.org 查看“天涯大盗”当年的首页存档，或某些具体文章的历史页面。和今天重新整理后的文字相比，那些旧页面更接近当时真实的写作现场：页面的样子、留言的温度、读者来来往往的互动，都还留有时代的痕迹。
          - paragraph [ref=e55]: 许多链接会失效，许多平台会消失，许多名字也会被新的潮流覆盖；但总有一些页面还留在时间背后，替我们保存住曾经说过的话、走过的路，和一个人试图用写作抵达世界时留下的微弱却真实的光。
